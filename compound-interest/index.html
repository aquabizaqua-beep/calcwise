<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Compound Interest Calculator – Investment Growth</title>
<meta name="description" content="Free compound interest calculator. See how your savings and monthly contributions grow over time with compounding." />
<link rel="canonical" href="https://REPLACE_DOMAIN/compound-interest/" />
<style>
:root{--card:#fff;--ink:#0f172a;--muted:#64748b;--brand:#2563eb;--line:#e2e8f0;--bg:#f8fafc}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--ink);background:var(--bg);line-height:1.55}main{max-width:720px;margin:0 auto;padding:20px}h1{font-size:1.7rem;margin:.2em 0}.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px;margin:16px 0}label{display:block;font-weight:600;margin:12px 0 4px;font-size:.92rem}input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px;font-size:1rem}button{margin-top:16px;width:100%;padding:13px;border:0;border-radius:9px;background:var(--brand);color:#fff;font-size:1.05rem;font-weight:600;cursor:pointer}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.result{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line)}.big{font-size:2rem;font-weight:700;color:var(--brand)}.ad-slot{min-height:90px;background:#f1f5f9;border:1px dashed #cbd5e1;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#94a3b8;margin:16px 0}.muted{color:var(--muted);font-size:.9rem}
</style>
</head>
<body>
<main>
<h1>Compound Interest Calculator</h1>
<p class="muted">See how your money grows with compound interest and monthly contributions.</p>
<div class="ad-slot">Ad slot (top)</div>
<div class="card">
  <div class="grid">
    <div><label>Initial amount ($)</label><input id="principal" type="number" value="10000"></div>
    <div><label>Monthly contribution ($)</label><input id="monthly" type="number" value="200"></div>
    <div><label>Annual rate (%)</label><input id="rate" type="number" value="8" step="0.1"></div>
    <div><label>Years</label><input id="years" type="number" value="20"></div>
  </div>
  <button id="btn">Calculate</button>
</div>
<div class="card" id="results" hidden>
  <div class="result"><span>Total contributed</span><b id="o_contrib"></b></div>
  <div class="result"><span>Interest earned</span><b id="o_interest"></b></div>
  <div class="result"><span>Future value</span><b class="big" id="o_fv"></b></div>
</div>
<script>
const f=new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0});
function g(id){return parseFloat(document.getElementById(id).value)||0}
function calc(){const P=g('principal'),pmt=g('monthly'),rate=g('rate'),years=g('years');const r=rate/100/12,n=Math.round(years*12);let bal=P;for(let i=0;i<n;i++)bal=bal*(1+r)+pmt;const contrib=P+pmt*n;document.getElementById('o_contrib').textContent=f.format(contrib);document.getElementById('o_interest').textContent=f.format(bal-contrib);document.getElementById('o_fv').textContent=f.format(bal);document.getElementById('results').hidden=false;}
document.getElementById('btn').addEventListener('click',calc);calc();
</script>
</main>
</body>
</html>
