<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Debt Payoff Calculator – Snowball vs Avalanche</title>
<meta name="description" content="Free debt payoff calculator. Compare the snowball and avalanche methods to see how fast you become debt-free and how much interest you save." />
<link rel="canonical" href="https://REPLACE_DOMAIN/debt-payoff/" />
<style>
:root{--card:#fff;--ink:#0f172a;--muted:#64748b;--brand:#2563eb;--line:#e2e8f0;--bg:#f8fafc}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--ink);background:var(--bg);line-height:1.55}main{max-width:720px;margin:0 auto;padding:20px}h1{font-size:1.7rem;margin:.2em 0}.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px;margin:16px 0}label{display:block;font-weight:600;margin:12px 0 4px;font-size:.92rem}input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px;font-size:1rem}button{margin-top:16px;width:100%;padding:13px;border:0;border-radius:9px;background:var(--brand);color:#fff;font-size:1.05rem;font-weight:600;cursor:pointer}.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}.result{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line)}.big{font-size:2rem;font-weight:700;color:var(--brand)}.ad-slot{min-height:90px;background:#f1f5f9;border:1px dashed #cbd5e1;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#94a3b8;margin:16px 0}.muted{color:var(--muted);font-size:.9rem}
</style>
</head>
<body>
<main>
<h1>Debt Payoff Calculator</h1>
<p class="muted">Compare snowball vs avalanche. Edit your debts and an extra monthly payment.</p>
<div class="ad-slot">Ad slot (top)</div>
<div class="card" id="debts"></div>
<div class="card">
  <label>Extra monthly payment ($)</label>
  <input id="extra" type="number" value="200">
  <button id="btn">Compare</button>
</div>
<div class="card" id="results" hidden>
  <div class="result"><span>Snowball — payoff time</span><b id="s_time"></b></div>
  <div class="result"><span>Snowball — total interest</span><b id="s_int"></b></div>
  <div class="result"><span>Avalanche — payoff time</span><b id="a_time"></b></div>
  <div class="result"><span>Avalanche — total interest</span><b id="a_int"></b></div>
  <div class="result"><span>Avalanche saves you</span><b class="big" id="save"></b></div>
</div>
<script>
const f=new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0});
const seed=[{bal:6000,rate:22,min:150},{bal:12000,rate:7,min:280},{bal:9000,rate:5,min:120}];
const box=document.getElementById('debts');
seed.forEach((d,i)=>{box.insertAdjacentHTML('beforeend',`<div class="grid"><div><label>Debt ${i+1} balance ($)</label><input id="b${i}" type="number" value="${d.bal}"></div><div><label>Rate (%)</label><input id="r${i}" type="number" value="${d.rate}" step="0.1"></div><div><label>Min payment ($)</label><input id="m${i}" type="number" value="${d.min}"></div></div>`);});
function read(){return seed.map((d,i)=>({bal:parseFloat(document.getElementById('b'+i).value)||0,rate:parseFloat(document.getElementById('r'+i).value)||0,min:parseFloat(document.getElementById('m'+i).value)||0}));}
function sim(debts,extra,mode){debts=debts.map(d=>({...d}));let months=0,interest=0;while(debts.some(d=>d.bal>0)&&months<1200){months++;for(const d of debts){if(d.bal<=0)continue;const ic=d.bal*d.rate/100/12;d.bal+=ic;interest+=ic;const pay=Math.min(d.min,d.bal);d.bal-=pay;}let pool=extra;const order=debts.filter(d=>d.bal>0).sort((a,b)=>mode==='snowball'?a.bal-b.bal:b.rate-a.rate);for(const d of order){if(pool<=0)break;const pay=Math.min(pool,d.bal);d.bal-=pay;pool-=pay;}}return{months,interest};}
function fmtM(m){return Math.floor(m/12)+'y '+(m%12)+'m';}
function calc(){const d=read(),extra=parseFloat(document.getElementById('extra').value)||0;const s=sim(d,extra,'snowball'),a=sim(d,extra,'avalanche');document.getElementById('s_time').textContent=fmtM(s.months);document.getElementById('s_int').textContent=f.format(s.interest);document.getElementById('a_time').textContent=fmtM(a.months);document.getElementById('a_int').textContent=f.format(a.interest);document.getElementById('save').textContent=f.format(Math.max(s.interest-a.interest,0));document.getElementById('results').hidden=false;}
document.getElementById('btn').addEventListener('click',calc);calc();
</script>
</main>
</body>
</html>
