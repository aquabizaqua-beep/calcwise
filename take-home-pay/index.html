<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Take-Home Pay Calculator – Salary After Tax by State</title>
<meta name="description" content="Free take-home pay calculator. Estimate your salary after federal tax, FICA and state tax for any US state. Annual and monthly net pay." />
<link rel="canonical" href="https://REPLACE_DOMAIN/take-home-pay/" />
<style>
:root{--card:#fff;--ink:#0f172a;--muted:#64748b;--brand:#2563eb;--line:#e2e8f0;--bg:#f8fafc}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--ink);background:var(--bg);line-height:1.55}main{max-width:720px;margin:0 auto;padding:20px}h1{font-size:1.7rem;margin:.2em 0}.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px;margin:16px 0}label{display:block;font-weight:600;margin:12px 0 4px;font-size:.92rem}input,select{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px;font-size:1rem}button{margin-top:16px;width:100%;padding:13px;border:0;border-radius:9px;background:var(--brand);color:#fff;font-size:1.05rem;font-weight:600;cursor:pointer}.result{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line)}.big{font-size:2rem;font-weight:700;color:var(--brand)}.ad-slot{min-height:90px;background:#f1f5f9;border:1px dashed #cbd5e1;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#94a3b8;margin:16px 0}.muted{color:var(--muted);font-size:.9rem}
</style>
</head>
<body>
<main>
<h1>Take-Home Pay Calculator</h1>
<p class="muted">Estimate your salary after federal, FICA and state taxes.</p>
<div class="ad-slot">Ad slot (top)</div>
<div class="card">
  <label>Gross annual salary ($)</label>
  <input id="gross" type="number" value="75000">
  <label>State</label>
  <select id="state">
    <option>Texas</option><option>Florida</option><option>Washington</option><option>Nevada</option>
    <option>California</option><option>New York</option><option>Illinois</option>
    <option>Colorado</option><option>Georgia</option><option>Arizona</option>
  </select>
  <button id="btn">Calculate</button>
</div>
<div class="card" id="results" hidden>
  <div class="result"><span>Federal tax</span><b id="o_fed"></b></div>
  <div class="result"><span>FICA (SS + Medicare)</span><b id="o_fica"></b></div>
  <div class="result"><span>State tax</span><b id="o_state"></b></div>
  <div class="result"><span>Net annual</span><b id="o_net"></b></div>
  <div class="result"><span>Net monthly</span><b class="big" id="o_mo"></b></div>
</div>
<p class="muted">Estimate only. 2024 single-filer brackets, standard deduction $14,600, simplified flat state rates. Not tax advice.</p>
<script>
const f=new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0});
const stateRates={Texas:0,Florida:0,Washington:0,Nevada:0,California:0.093,'New York':0.0685,Illinois:0.0495,Colorado:0.044,Georgia:0.0549,Arizona:0.025};
function fedTax(t){const b=[[0,0.10],[11600,0.12],[47150,0.22],[100525,0.24],[191950,0.32],[243725,0.35],[609350,0.37]];let tax=0;for(let i=0;i<b.length;i++){const lo=b[i][0],hi=i+1<b.length?b[i+1][0]:Infinity,rate=b[i][1];if(t>lo)tax+=(Math.min(t,hi)-lo)*rate;else break;}return tax;}
function calc(){const gross=parseFloat(document.getElementById('gross').value)||0;const state=document.getElementById('state').value;const taxable=Math.max(gross-14600,0);const fed=fedTax(taxable);const ss=Math.min(gross,168600)*0.062;const medi=gross*0.0145;const st=gross*(stateRates[state]||0);const net=gross-fed-ss-medi-st;document.getElementById('o_fed').textContent=f.format(fed);document.getElementById('o_fica').textContent=f.format(ss+medi);document.getElementById('o_state').textContent=f.format(st);document.getElementById('o_net').textContent=f.format(net);document.getElementById('o_mo').textContent=f.format(net/12);document.getElementById('results').hidden=false;}
document.getElementById('btn').addEventListener('click',calc);calc();
</script>
</main>
</body>
</html>
